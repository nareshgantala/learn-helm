apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.service_name }}
  annotations:
{{- .Values.anote | nindent 4 }}
spec:
  {{ if .Values.loadBalancer}}
  type: LoadBalancer
  loadBalancerIP: {{ .Values.loadBalancerIP }} 
  {{ else }}
  type: clusterTP
  {{ end }}
  selector:
    app: {{ .Values.service_name }}
  ports:
{{- toYaml .Values.ports | nindent 2 }}