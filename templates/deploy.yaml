apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.name }}
  labels: {{ toYaml .Values.deployLabels }}
spec:
  replicas: {{ .Values.replacia_count }}
  selector:
    matchLabels: {{ toYaml .Values.deployLabels }}
  template:
    metadata:
      labels: {{ toYaml .Values.deployLabels }}
    spec:
      containers:
      - name: {{ .Values.container_name }}
        image: "{{ .Values.image.name }}:{{ .Values.image.version }}"
        ports:
        - containerPort: {{ .Values.port }}