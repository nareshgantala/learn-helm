service_name: roboshop-ratings
config_map:
      MYSQL_HOST: "mysql-dev.naresh-training.online"
      MYSQL_USER: "ratings"
      MYSQL_PASSWORD: "RoboShop@1"
      MYSQL_DATABASE: "ratings"
      PORT: "8006"
ports:
  - port: 8006
    targetPort: 8006

db_container_name: ratings-db

replica_count: 1

env:
  - configMapRef:
    name: roboshop-ratings

db_image: nareshroboshop.azurecr.io/roboshop-ratings-db

restart_policy: Never

imagePullPolicy: Always

image:
  name: nareshroboshop.azurecr.io/roboshop-ratings
  version: latest
